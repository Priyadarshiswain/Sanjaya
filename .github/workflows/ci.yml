name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 8.0.x

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Restore npm metadata
        run: npm ci --ignore-scripts

      - name: Restore .NET dependencies
        run: dotnet restore Sanjaya.sln

      - name: Build
        run: dotnet build Sanjaya.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test Sanjaya.sln --no-build --configuration Release

      - name: Verify formatting
        run: dotnet format Sanjaya.sln --no-restore --verify-no-changes

      - name: Check npm launcher syntax
        run: node --check bin/sanjaya-mcp.js

      - name: Verify VS Code install contract
        run: npm run verify:vscode-install

      - name: Verify Official MCP Registry metadata
        run: npm run verify:registry-metadata

      - name: Build framework-dependent npm payload
        run: npm run build -- --no-restore

      - name: Verify vendored TypeScript artifact
        run: npm run verify:typescript

      - name: Verify TypeScript worker boundary
        run: npm run verify:typescript-worker

      - name: Verify npm launcher MCP handshake
        run: npm run verify:launcher

      - name: Verify first-run diagnostics
        run: npm run verify:diagnostics

      - name: Inspect package contents
        run: npm run verify:package

      - name: Build and verify exact release candidate
        run: |
          npm run release:candidate
          npm run verify:release-candidate -- --require-clean

  package-portability:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 8.0.x

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Restore npm metadata
        run: npm ci --ignore-scripts

      - name: Restore .NET dependencies
        run: dotnet restore Sanjaya.sln

      - name: Verify VS Code install contract
        run: npm run verify:vscode-install

      - name: Verify Official MCP Registry metadata
        run: npm run verify:registry-metadata

      - name: Build clean portable package
        run: npm run build -- --no-restore --disable-build-servers

      - name: Verify vendored TypeScript artifact
        run: npm run verify:typescript

      - name: Verify TypeScript worker boundary
        run: npm run verify:typescript-worker

      - name: Inspect exact package contents
        run: npm run verify:package

      - name: Verify first-run diagnostics
        run: npm run verify:diagnostics

      - name: Install tarball offline and verify MCP
        run: npm run verify:installed-package
